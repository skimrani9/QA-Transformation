<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App</title>
</head>

<body>
    <div class="main-div">
        <div class="upper-div">
            <div class="user-input-card">
                <div class="city_input">
                    <a class="city_name_text">Enter City Name</a>
                    <input type="text" class="city_name_input" placeholder="City Name">
                </div>
                <div class="search_button">
                    <button onclick="SearchWeather()">Search</button>
                </div>
            </div>
            <div class="weather-card">
                <div class="location">
                    <h1 class="city-name">NA</h1>
                    <span class="location-icon">📍</span>
                </div>
                <p class="region-country">NA</p>
                <h2 class="temperature">NA°C</h2>
                <p class="condition">NA</p>
                <p class="feels-like">Feels like NA°C</p>
            </div>
        </div>
        <div class="lower-div-card">
            <div class="lower-div-boxs">

            </div>
            <div class="lower-div-boxs">
                
            </div>
            <div class="lower-div-boxs">
                
            </div>
            <div class="lower-div-boxs">
                
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
