<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <header>

    </header>
    <section class="RPS">
        <div class="RPS-name">
            <h1>Rock Paper Scissors</h1>
        </div>
        <div class="result">
            <a id="result">RESULTS :</a>
            <button id="page_load" onclick="Reload_Page()">Reset Score</button>
        </div>
        <div class="player-moves">
            <div class="first-player-move">User Score :<a id="userscore"></a></div>
            <div class="second-player-move">Computer Score :<a id="computerscore"></a></div>
        </div>
        <div class="player-moves">
            <div class="first-player-move">User Choose :<a id="userchoose"></a></div>
            <div class="second-player-move">Computer Choose :<a id="computerchoose"></a></div>
        </div>
        <div class="choose-title">Choose Your Move Rock, Paper, Scissors</div>
        <div class="user-choose-button">
            <div class="choose-button-1">
                <button onclick="playGame('rock')">Rock</button>
            </div>
            <div class="choose-button-2">
                <button onclick="playGame('paper')">Paper</button>
            </div>
            <div class="choose-button-3">
                <button onclick="playGame('scissors')">Scissors</button>
            </div>
        </div>
    </section>
    <script src="RPS.js"></script>
</body>
</html>
